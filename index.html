<!DOCTYPE html>
<html lang="en">
<head>
    <base href="https://flashloader.pages.dev/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Loader</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#37528c" />
    <link rel="manifest" href="/manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        :root {
            --bg-primary: #37528c;
            --bg-secondary: #4161a7;
            --bg-dark: #16223a;
            --text-main: #ffffff;
            --accent: #5c85d6;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow: hidden;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 0; }
        ::-webkit-scrollbar-thumb:hover { background: #7da0e6; }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: var(--bg-primary);
            color: #f4f4f4;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #gameListContainer {
            padding: 20px;
            width: 100%; height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        #searchBar {
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--bg-secondary);
            background-color: #223254;
            color: #fff;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .game-item {
            padding: 12px 20px;
            background-color: var(--bg-secondary);
            border: 1px solid #2e4678;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #gameContainer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            background-color: #000;
            z-index: 10;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #authWrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #authMenu {
            display: none;
            background: var(--bg-dark);
            border: 1px solid var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            max-height: 80vh;
            overflow-y: auto;
        }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
            border-bottom: 1px solid #2e4678;
        }

        .menu-item:last-child { border-bottom: none; }
        .menu-item:hover { background: var(--bg-secondary); }

        .text-btn {
            display: none;
            background: var(--bg-dark);
            border: 1px solid var(--bg-secondary);
            border-radius: 8px;
            padding: 0 20px;
            height: 45px;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .data-modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--bg-primary);
            padding: 20px;
            border-radius: 12px;
            z-index: 11000;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 10999;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #2e4678;
        }

        ruffle-player, ruffle-embed { width: 100% !important; height: 100% !important; }
        embed { width: 100%; height: 100%; }
    </style>
</head>

<body>
    <div id="loading" class="overlay">
        <div class="spinner"></div>
        <div id="loadingText">Syncing data...</div>
    </div>
    <div id="error" class="overlay"><pre id="errorMessage"></pre></div>

    <div id="modalOverlay" class="modal-overlay"></div>
    <div id="dataModal" class="data-modal">
        <h3>Unsaved Large Data</h3>
        <div id="dataContent" style="max-height: 300px; overflow-y: auto;"></div>
        <button onclick="App.closeModal()" style="margin-top: 15px; width: 100%; padding: 10px;">Close</button>
    </div>

    <div id="gameListContainer">
        <input type="text" id="searchBar" placeholder="Search games...">
        <div id="gameList"></div>
    </div>

    <div id="gameContainer"></div>

    <div id="authWrapper">
        <div id="authMenu"></div>
        <button id="mainControlBtn" class="text-btn"></button>
    </div>

    <input type="file" id="fileInput" style="display: none;" accept=".swf">
    <input type="file" id="importInput" style="display: none;">

    <script src="https://cloudsaver2.pages.dev/main.js"></script>

    <script>
        const App = {
            games: [],
            saveInterval: null,
            menuCheckInterval: null,
            isLoggedIn: false,
            hasNativeFlash: false,
            ruffleLoaded: false,

            async init() {
                this.checkFlash();
                this.loadSessionFromCookie();
                this.bindEvents();
                await this.updateAuthUI();
                await this.route();
            },

            checkFlash() {
                const hasPlugin = navigator.plugins && navigator.plugins.length > 0;
                const hasMime = navigator.mimeTypes && navigator.mimeTypes['application/x-shockwave-flash'];
                this.hasNativeFlash = (hasPlugin && !!navigator.plugins["Shockwave Flash"]) || (hasMime && hasMime.enabledPlugin);
            },

            async loadRuffleScript() {
                if (this.ruffleLoaded) return true;
                return new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = "https://unpkg.com/@ruffle-rs/ruffle";
                    script.onload = () => {
                        this.ruffleLoaded = true;
                        resolve(true);
                    };
                    document.head.appendChild(script);
                });
            },

            loadSessionFromCookie() {
                const cookie = document.cookie.split('; ').find(row => row.startsWith('cs_usr='));
                if (cookie) {
                    try {
                        const userData = JSON.parse(decodeURIComponent(cookie.split('=')[1]));
                        Object.assign(CloudSaver.usr, userData);
                    } catch (e) {}
                }
            },

            async updateAuthUI() {
                const btn = document.getElementById('mainControlBtn');
                const menu = document.getElementById('authMenu');
                const hasCookie = !!document.cookie.split('; ').find(row => row.startsWith('cs_usr='));

                this.isLoggedIn = hasCookie && await CloudSaver.VerifyUser();
                btn.style.display = 'flex';
                btn.textContent = this.isLoggedIn ? "Account" : "Data";

                btn.onclick = (e) => {
                    e.stopPropagation();
                    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
                };

                menu.innerHTML = '';

                if (!this.isLoggedIn) {
                    const loginItem = this.createEl('div', 'menu-item', 'Log In');
                    loginItem.onclick = async () => {
                        await CloudSaver.ShowLoginPopup();
                        if (CloudSaver.usr) {
                            document.cookie = `cs_usr=${encodeURIComponent(JSON.stringify(CloudSaver.usr))}; path=/; max-age=31536000; SameSite=Lax`;
                            location.reload();
                        }
                    };
                    menu.appendChild(loginItem);
                } else {
                    const reloadItem = this.createEl('div', 'menu-item', 'Load current cloud saves');
                    reloadItem.onclick = () => CloudSaver.LoadSaves();

                    const forceSaveItem = this.createEl('div', 'menu-item', 'Upload saves to cloud');
                    forceSaveItem.onclick = () => CloudSaver.Save();

                    const manageItem = this.createEl('div', 'menu-item', 'Manage cloud data');
                    manageItem.onclick = async () => {
                        await CloudSaver.OpenDataManager();
                        location.reload();
                    };

                    const logoutItem = this.createEl('div', 'menu-item', 'Log Out');
                    logoutItem.onclick = () => {
                        document.cookie = "cs_usr=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
                        location.reload();
                    };

                    const checkItem = this.createEl('div', 'menu-item', 'Check unsaved data');
                    checkItem.onclick = () => this.checkLargeData();

                    menu.appendChild(checkItem);
                    menu.appendChild(reloadItem);
                    menu.appendChild(forceSaveItem);
                    menu.appendChild(manageItem);
                    menu.appendChild(logoutItem);
                }

                const exportItem = this.createEl('div', 'menu-item', 'Download all saves');
                exportItem.onclick = () => this.downloadAllSaves();
                menu.appendChild(exportItem);

                const importItem = this.createEl('div', 'menu-item', 'Upload a save');
                importItem.onclick = () => document.getElementById('importInput').click();
                menu.appendChild(importItem);
            },

            checkLargeData() {
                const content = document.getElementById('dataContent');
                content.innerHTML = '';
                let found = false;

                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    const val = localStorage.getItem(key);
                    const size = val.length * 2; // Rough byte estimate for UTF-16

                    if (size > 1.5 * 1024 * 1024) {
                        found = true;
                        const row = this.createEl('div', 'data-row');
                        row.innerHTML = `
                            <span>${key.substring(0, 20)}...</span>
                            <div>
                                <button onclick="App.downloadSingle('${key}')">Download</button>
                                <button onclick="App.deleteSingle('${key}')">Delete</button>
                            </div>
                        `;
                        content.appendChild(row);
                    }
                }

                if (!found) content.innerHTML = '<p>You don\'t have any files that are too big for cloud saving</p>';

                document.getElementById('modalOverlay').style.display = 'block';
                document.getElementById('dataModal').style.display = 'block';
            },

            downloadSingle(key) {
                const blob = new Blob([localStorage.getItem(key)], { type: 'application/octet-stream' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${key}.sav`;
                a.click();
            },

            deleteSingle(key) {
                localStorage.removeItem(key);
                this.checkLargeData();
            },

            closeModal() {
                document.getElementById('modalOverlay').style.display = 'none';
                document.getElementById('dataModal').style.display = 'none';
            },

            async downloadAllSaves() {
                const zip = new JSZip();
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    zip.file(key, localStorage.getItem(key));
                }
                const content = await zip.generateAsync({ type: "blob" });
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = "all_saves.zip";
                a.click();
            },

            async handleImport(file) {
                if (!file) return;
                const name = file.name.toLowerCase();

                if (name.endsWith('.zip')) {
                    localStorage.clear();
                    const zip = await JSZip.loadAsync(file);
                    zip.forEach(async (path, zipEntry) => {
                        const content = await zipEntry.async("string");
                        localStorage.setItem(path, content);
                    });
                } else if (name.endsWith('.sav')) {
                    const reader = new FileReader();
                    reader.onload = (e) => localStorage.setItem(file.name.replace('.sav', ''), e.target.result);
                    reader.readAsText(file);
                }
            },

            bindEvents() {
                document.getElementById('searchBar').addEventListener('input', (e) => this.filterGames(e.target.value));
                window.addEventListener('hashchange', () => this.route());
                document.getElementById('fileInput').addEventListener('change', (e) => this.handleFileSelect(e));
                document.getElementById('importInput').addEventListener('change', (e) => this.handleImport(e.target.files[0]));
                document.addEventListener('click', () => { document.getElementById('authMenu').style.display = 'none'; });
            },

            async route() {
                const hash = window.location.hash.substring(1);
                if (hash) {
                    await this.loadGameData();
                    this.playGame(decodeURIComponent(hash));
                } else {
                    this.showListView();
                }
            },

            async loadGameData() {
                if (this.games.length > 0) return;
                this.toggleLoading(true, "Fetching games...");
                try {
                    const res = await fetch("games.json");
                    this.games = await res.json();
                } catch (err) {
                    this.showError("Failed to fetch game list.");
                } finally {
                    this.toggleLoading(false);
                }
            },

            showListView() {
                clearInterval(this.saveInterval);
                clearInterval(this.menuCheckInterval);
                document.getElementById('gameListContainer').style.display = 'flex';
                document.getElementById('gameContainer').style.display = 'none';
                document.getElementById('authWrapper').style.display = 'flex';
                document.getElementById('gameContainer').innerHTML = '';
                this.renderList();
            },

            async renderList() {
                await this.loadGameData();
                const container = document.getElementById('gameList');
                container.innerHTML = '';
                const localBtn = this.createEl('div', 'game-item', 'Load local SWF file');
                localBtn.onclick = () => document.getElementById('fileInput').click();
                container.appendChild(localBtn);

                this.games.forEach(game => {
                    if (game.hidden) return;
                    const el = this.createEl('div', 'game-item', game.name);
                    el.onclick = () => window.location.hash = game.name;
                    container.appendChild(el);
                });
            },

            async playGame(name) {
                const game = this.games.find(g => g.name === name);
                if (!game) return this.showError("Game not found.");

                if (this.hasNativeFlash) {
                    this.bootNativeFlash(game.url, name);
                    return;
                }

                if (this.isLoggedIn) {
                    this.toggleLoading(true, "Syncing saves...");
                    await CloudSaver.LoadSaves();
                }

                await this.loadRuffleScript();
                this.bootRuffle(game.url, name);
                if (this.isLoggedIn) {
                    this.saveInterval = setInterval(() => CloudSaver.SaveChanges(), 10000);
                }
            },

            bootNativeFlash(url, title) {
                document.title = title;
                document.getElementById('gameListContainer').style.display = 'none';
                document.getElementById('authWrapper').style.display = 'none';
                const container = document.getElementById('gameContainer');
                container.style.display = 'block';
                container.innerHTML = `<embed src="${url}" type="application/x-shockwave-flash">`;
            },

            bootRuffle(url, title) {
                this.toggleLoading(true, "Starting Ruffle...");
                document.title = title;
                document.getElementById('gameListContainer').style.display = 'none';
                document.getElementById('authWrapper').style.display = 'none';

                const container = document.getElementById('gameContainer');
                container.style.display = 'block';
                container.innerHTML = '';

                var ruffle = window.RufflePlayer.newest();
                var player = ruffle.createPlayer();
                player.style.width = "100%";
                player.style.height = "100%";
                container.appendChild(player);

                player.load({
                    url: url,
                    autoplay: "on",
                    unmuteOverlay: "hidden",
                    maxExecutionDuration: 99999999999
                }).then(() => {
                    this.toggleLoading(false);
                }).catch(err => this.showError("Ruffle Error: " + err));

                this.menuCheckInterval = setInterval(() => {
                    const ruffleEl = document.querySelector('ruffle-player') || document.querySelector('ruffle-embed');
                    if (ruffleEl && ruffleEl.shadowRoot) {
                        const shadow = ruffleEl.shadowRoot;
                        CloudSaver.document = shadow;

                        const targetLi = shadow.querySelector('li[data-text*="About Ruffle"]');
                        if (targetLi && targetLi.textContent !== "Upload saves to cloud") {
                            const newLi = targetLi.cloneNode(true);
                            newLi.textContent = "Upload saves to cloud";
                            newLi.onclick = (e) => {
                                e.preventDefault();
                                e.stopPropagation();
                                CloudSaver.Save();
                                const overlay = shadow.getElementById('context-menu-overlay');
                                if (overlay) overlay.classList.add('hidden');
                            };
                            targetLi.replaceWith(newLi);
                        }
                    }
                }, 100);
            },

            async handleFileSelect(e) {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                if (this.hasNativeFlash) {
                    this.bootNativeFlash(url, file.name);
                } else {
                    await this.loadRuffleScript();
                    this.bootRuffle(url, file.name);
                }
            },

            filterGames(query) {
                const q = query.toLowerCase();
                document.querySelectorAll('.game-item').forEach(el => {
                    el.style.display = el.textContent.toLowerCase().includes(q) ? 'block' : 'none';
                });
            },

            createEl(tag, className, text) {
                const el = document.createElement(tag);
                if (className) el.className = className;
                if (text) el.textContent = text;
                return el;
            },

            toggleLoading(show, text = "Loading...") {
                const loader = document.getElementById('loading');
                document.getElementById('loadingText').textContent = text;
                loader.style.display = show ? 'flex' : 'none';
            },

            showError(msg) {
                document.getElementById('errorMessage').textContent = msg;
                document.getElementById('error').style.display = 'flex';
                this.toggleLoading(false);
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
