<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Loader</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#37528c" />
    <link rel="manifest" href="/manifest.json">
    <meta name="description" content="A collection of Flash games using the Ruffle emulator"/>

    <style>
        :root {
            --bg-primary: #37528c;
            --bg-secondary: #4161a7;
            --text-main: #ffffff;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow: hidden;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: var(--bg-primary);
            color: #f4f4f4;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #gameListContainer {
            padding: 20px;
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #searchBar {
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--bg-secondary);
            background-color: #223254;
            color: #fff;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .game-item {
            padding: 12px 20px;
            background-color: var(--bg-secondary);
            border: 1px solid #2e4678;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #gameContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: none;
            background-color: #000;
            z-index: 10;
        }

        /* Ensures the custom player fills the div */
        ruffle-player {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>
    <div id="loading" class="overlay">Loading...</div>
    <div id="error" class="overlay"><pre id="errorMessage"></pre></div>

    <div id="gameListContainer">
        <input type="text" id="searchBar" placeholder="Search games...">
        <div id="gameList"></div>
    </div>

    <div id="gameContainer"></div>

    <input type="file" id="fileInput" style="display: none;" accept=".swf">

    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
        const App = {
            games: [],
            config: {
                jsonPath: "/games.json"
            },

            async init() {
                this.bindEvents();
                await this.route();
            },

            bindEvents() {
                document.getElementById('searchBar').addEventListener('input', (e) => this.filterGames(e.target.value));
                window.addEventListener('hashchange', () => this.route());
                document.getElementById('fileInput').addEventListener('change', (e) => this.handleFileSelect(e));
            },

            async route() {
                const hash = window.location.hash.substring(1);
                if (hash) {
                    await this.loadGameData();
                    this.playGame(decodeURIComponent(hash));
                } else {
                    this.showListView();
                }
            },

            async loadGameData() {
                if (this.games.length > 0) return;
                this.toggleLoading(true);
                try {
                    const res = await fetch(this.config.jsonPath);
                    this.games = await res.json();
                } catch (err) {
                    this.showError("Failed to fetch game list.");
                } finally {
                    this.toggleLoading(false);
                }
            },

            showListView() {
                document.getElementById('gameListContainer').style.display = 'flex';
                document.getElementById('gameContainer').style.display = 'none';
                document.getElementById('gameContainer').innerHTML = '';
                this.renderList();
            },

            async renderList() {
                await this.loadGameData();
                const container = document.getElementById('gameList');
                container.innerHTML = '';

                const localBtn = this.createEl('div', 'game-item', 'Load local SWF file');
                localBtn.onclick = () => document.getElementById('fileInput').click();
                container.appendChild(localBtn);

                this.games.forEach(game => {
                    if (game.hidden) return;
                    const el = this.createEl('div', 'game-item', game.name);
                    el.onclick = () => window.location.hash = game.name;
                    container.appendChild(el);
                });
            },

            async playGame(name) {
                const game = this.games.find(g => g.name === name);
                if (!game) return this.showError("Game not found.");
                this.bootRuffle(game.url, name);
            },

            bootRuffle(url, title) {
                this.toggleLoading(true);
                document.title = title || "Playing Flash";
                document.getElementById('gameListContainer').style.display = 'none';

                const container = document.getElementById('gameContainer');
                container.style.display = 'block';
                container.innerHTML = '';

                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();

                container.appendChild(player);

                player.style.width = "100%";
                player.style.height = "100%";

                player.load({
                    url: url,
                    autoplay: "on",
                    unmuteOverlay: "hidden",
                    maxExecutionDuration: 99999999999
                }).then(() => {
                    this.toggleLoading(false);
                }).catch((err) => {
                    this.showError("Ruffle failed to load: " + err);
                });
            },

            handleFileSelect(e) {
                const file = e.target.files[0];
                if (!file) return;
                const url = URL.createObjectURL(file);
                this.bootRuffle(url, file.name);
            },

            filterGames(query) {
                const q = query.toLowerCase();
                document.querySelectorAll('.game-item').forEach(el => {
                    el.style.display = el.textContent.toLowerCase().includes(q) ? 'flex' : 'none';
                });
            },

            createEl(tag, className, text) {
                const el = document.createElement(tag);
                if (className) el.className = className;
                if (text) el.textContent = text;
                return el;
            },

            toggleLoading(show) {
                document.getElementById('loading').style.display = show ? 'flex' : 'none';
            },

            showError(msg) {
                document.getElementById('errorMessage').textContent = msg;
                document.getElementById('error').style.display = 'flex';
                this.toggleLoading(false);
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
