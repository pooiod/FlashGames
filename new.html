<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Loader</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <meta name="theme-color" content="#37528c" />
    <link rel="manifest" href="/manifest.json">

    <style>
        :root {
            --bg-primary: #37528c;
            --bg-secondary: #4161a7;
            --bg-dark: #16223a;
            --text-main: #ffffff;
            --accent: #5c85d6;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            font-family: Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent);
            border-radius: 0;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #7da0e6;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background-color: var(--bg-primary);
            color: #f4f4f4;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #gameListContainer {
            padding: 20px;
            width: 100%; height: 100%;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 80px;
        }

        #searchBar {
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid var(--bg-secondary);
            background-color: #223254;
            color: #fff;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .game-item {
            padding: 12px 20px;
            background-color: var(--bg-secondary);
            border: 1px solid #2e4678;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 10px;
        }

        #gameContainer {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: none;
            background-color: #000;
            z-index: 10;
        }

        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255,255,255,0.3);
            border-top: 5px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #authWrapper {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        #authMenu {
            display: none;
            background: var(--bg-dark);
            border: 1px solid var(--bg-secondary);
            border-radius: 8px;
            margin-bottom: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            white-space: nowrap;
        }

        .menu-item:hover { background: var(--bg-secondary); }
        .menu-item svg { width: 18px; height: 18px; fill: white; }

        .icon-btn {
            background: var(--bg-dark);
            border: 1px solid var(--bg-secondary);
            border-radius: 50%;
            width: 50px; height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .icon-btn svg { width: 24px; height: 24px; fill: white; }

        ruffle-player { width: 100% !important; height: 100% !important; }
    </style>
</head>

<body>
    <div id="loading" class="overlay">
        <div class="spinner"></div>
        <div id="loadingText">Syncing data...</div>
    </div>
    <div id="error" class="overlay"><pre id="errorMessage"></pre></div>

    <div id="gameListContainer">
        <input type="text" id="searchBar" placeholder="Search games...">
        <div id="gameList"></div>
    </div>

    <div id="gameContainer"></div>

    <div id="authWrapper">
        <div id="authMenu"></div>
        <button id="mainControlBtn" class="icon-btn"></button>
    </div>

    <input type="file" id="fileInput" style="display: none;" accept=".swf">

    <script src="https://cloudsaver2.pages.dev/main.js"></script>
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>

    <script>
        const App = {
            games: [],
            saveInterval: null,
            menuCheckInterval: null,
            isLoggedIn: false,
            icons: {
                logout: `<svg viewBox="0 0 24 24"><path d="M13 3h-2v10h2v-10zm4.83 2.17l-1.42 1.42c1.6 1.6 2.59 3.81 2.59 6.41 0 4.97-4.03 9-9 9s-9-4.03-9-9c0-2.6 1-4.81 2.59-6.41l-1.42-1.42c-2.19 2.19-3.5 5.21-3.5 8.83 0 6.63 5.37 12 12 12s12-5.37 12-12c0-3.62-1.31-6.64-3.5-8.83z"/></svg>`,
                settings: `<svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>`,
                user: `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>`
            },

            async init() {
                this.loadSessionFromCookie();
                this.bindEvents();
                await this.updateAuthUI();
                await this.route();
            },

            loadSessionFromCookie() {
                const cookie = document.cookie.split('; ').find(row => row.startsWith('cs_usr='));
                if (cookie) {
                    try {
                        const userData = JSON.parse(decodeURIComponent(cookie.split('=')[1]));
                        Object.assign(CloudSaver.usr, userData);
                    } catch (e) {}
                }
            },

            async updateAuthUI() {
                const btn = document.getElementById('mainControlBtn');
                const menu = document.getElementById('authMenu');
                const hasCookie = !!document.cookie.split('; ').find(row => row.startsWith('cs_usr='));

                this.isLoggedIn = hasCookie && await CloudSaver.VerifyUser();
                btn.innerHTML = this.icons.user;

                if (!this.isLoggedIn) {
                    btn.onclick = async () => {
                        await CloudSaver.ShowLoginPopup();
                        if (CloudSaver.usr) {
                            document.cookie = `cs_usr=${encodeURIComponent(JSON.stringify(CloudSaver.usr))}; path=/; max-age=31536000; SameSite=Lax`;
                            location.reload();
                        }
                    };
                } else {
                    btn.onclick = (e) => {
                        e.stopPropagation();
                        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
                    };

                    menu.innerHTML = '';
                    const manageItem = this.createEl('div', 'menu-item');
                    manageItem.innerHTML = `${this.icons.settings} <span>Manage Data</span>`;
                    manageItem.onclick = async () => {
                        await CloudSaver.OpenDataManager();
                        location.reload();
                    };

                    const logoutItem = this.createEl('div', 'menu-item');
                    logoutItem.innerHTML = `${this.icons.logout} <span>Log Out</span>`;
                    logoutItem.onclick = () => {
                        document.cookie = "cs_usr=; path=/; expires=Thu, 01 Jan 1970 00:00:00 UTC;";
                        location.reload();
                    };

                    menu.appendChild(manageItem);
                    menu.appendChild(logoutItem);
                }
            },

            bindEvents() {
                document.getElementById('searchBar').addEventListener('input', (e) => this.filterGames(e.target.value));
                window.addEventListener('hashchange', () => this.route());
                document.getElementById('fileInput').addEventListener('change', (e) => this.handleFileSelect(e));
                document.addEventListener('click', () => { document.getElementById('authMenu').style.display = 'none'; });
            },

            async route() {
                const hash = window.location.hash.substring(1);
                if (hash) {
                    await this.loadGameData();
                    this.playGame(decodeURIComponent(hash));
                } else {
                    this.showListView();
                }
            },

            async loadGameData() {
                if (this.games.length > 0) return;
                this.toggleLoading(true, "Fetching games...");
                try {
                    const res = await fetch("games.json");
                    this.games = await res.json();
                } catch (err) {
                    this.showError("Failed to fetch game list.");
                } finally {
                    this.toggleLoading(false);
                }
            },

            showListView() {
                clearInterval(this.saveInterval);
                clearInterval(this.menuCheckInterval);
                document.getElementById('gameListContainer').style.display = 'flex';
                document.getElementById('gameContainer').style.display = 'none';
                document.getElementById('authWrapper').style.display = 'flex';
                document.getElementById('gameContainer').innerHTML = '';
                this.renderList();
            },

            async renderList() {
                await this.loadGameData();
                const container = document.getElementById('gameList');
                container.innerHTML = '';
                const localBtn = this.createEl('div', 'game-item', 'Load local SWF file');
                localBtn.onclick = () => document.getElementById('fileInput').click();
                container.appendChild(localBtn);

                this.games.forEach(game => {
                    if (game.hidden) return;
                    const el = this.createEl('div', 'game-item', game.name);
                    el.onclick = () => window.location.hash = game.name;
                    container.appendChild(el);
                });
            },

            async playGame(name) {
                const game = this.games.find(g => g.name === name);
                if (!game) return this.showError("Game not found.");

                if (this.isLoggedIn) {
                    this.toggleLoading(true, "Syncing saves...");
                    await CloudSaver.LoadSaves();
                }

                this.bootRuffle(game.url, name);
                if (this.isLoggedIn) {
                    this.saveInterval = setInterval(() => CloudSaver.SaveChanges(), 10000);
                }
            },

            bootRuffle(url, title) {
                this.toggleLoading(true, "Starting Ruffle...");
                document.title = title;
                document.getElementById('gameListContainer').style.display = 'none';
                document.getElementById('authWrapper').style.display = 'none';

                const container = document.getElementById('gameContainer');
                container.style.display = 'block';
                container.innerHTML = '';

                const ruffle = window.RufflePlayer.newest();
                const player = ruffle.createPlayer();
                container.appendChild(player);

                player.load({
                    url: url,
                    autoplay: "on",
                    unmuteOverlay: "hidden",
                    maxExecutionDuration: 99999999999
                }).then(() => {
                    const shadow = document.querySelector('ruffle-player').shadowRoot;
                    CloudSaver.document = shadow;

                    this.menuCheckInterval = setInterval(() => {
                        const targetLi = shadow.querySelector('li[data-text*="About Ruffle"]');
                        if (targetLi && targetLi.textContent !== "Save") {
                            const newLi = targetLi.cloneNode(true);
                            newLi.textContent = "Save";
                            newLi.onclick = (e) => {
                                e.preventDefault();
                                e.stopPropagation();
                                CloudSaver.SaveChanges();
                                const overlay = shadow.getElementById('context-menu-overlay');
                                if (overlay) overlay.classList.add('hidden');
                            };
                            targetLi.replaceWith(newLi);
                        }
                    }, 100);

                    this.toggleLoading(false);
                }).catch(err => this.showError("Ruffle Error: " + err));
            },

            handleFileSelect(e) {
                const file = e.target.files[0];
                if (!file) return;
                this.bootRuffle(URL.createObjectURL(file), file.name);
            },

            filterGames(query) {
                const q = query.toLowerCase();
                document.querySelectorAll('.game-item').forEach(el => {
                    el.style.display = el.textContent.toLowerCase().includes(q) ? 'block' : 'none';
                });
            },

            createEl(tag, className, text) {
                const el = document.createElement(tag);
                if (className) el.className = className;
                if (text) el.textContent = text;
                return el;
            },

            toggleLoading(show, text = "Loading...") {
                const loader = document.getElementById('loading');
                document.getElementById('loadingText').textContent = text;
                loader.style.display = show ? 'flex' : 'none';
            },

            showError(msg) {
                document.getElementById('errorMessage').textContent = msg;
                document.getElementById('error').style.display = 'flex';
                this.toggleLoading(false);
            }
        };

        window.onload = () => App.init();
    </script>
</body>
</html>
